{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center mt-5">

    <div class="col-md-5">

        <div class="card p-4">

            <h3 class="text-center mb-3">Reset Password</h3>

            <input id="password" type="password" class="form-control mb-2" placeholder="New Password">

            <input id="confirm_password" type="password" class="form-control mb-3" placeholder="Confirm Password">
            <button class="btn btn-success w-100" onclick="resetPassword()">
                Reset Password
            </button>

            <p id="msg" class="text-center mt-3"></p>

        </div>

    </div>

</div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const email = urlParams.get("email");

async function resetPassword() {

    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirm_password").value;

    if(password !== confirmPassword){
        document.getElementById("msg").innerText = "Passwords do not match!";
        return;
    }

    let res = await fetch("/api/reset-password-api/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    });

    let data = await res.json();

    document.getElementById("msg").innerText = data.message;

    setTimeout(() => {
        window.location.href = "/";
    }, 1500);
}

</script>

{% endblock %}
